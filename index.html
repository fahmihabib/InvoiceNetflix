<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGI Chip System</title>

<style>
body {
  font-family: monospace;
  background: #eef2f7;
  padding: 10px;
}

.container {
  max-width: 400px;
  margin: auto;
}

h2 {
  text-align: center;
}

/* 3D BUTTON */
.packages {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn {
  padding: 20px;
  text-align: center;
  background: #4CAF50;
  color: white;
  border-radius: 12px;
  box-shadow: 0 6px #2e7d32;
  cursor: pointer;
  font-weight: bold;
}

.btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px #2e7d32;
}

.submit, .printBtn {
  margin-top: 15px;
  padding: 15px;
  color: white;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
}

.submit {
  background: #2196F3;
  box-shadow: 0 6px #0b7dda;
}

.printBtn {
  background: #ff9800;
  box-shadow: 0 6px #e68900;
  display: none;
}

.submit:active, .printBtn:active {
  transform: translateY(4px);
  box-shadow: 0 2px #555;
}

/* RECEIPT */
.receipt {
  margin-top: 20px;
  background: white;
  padding: 12px;
  border: 1px dashed #000;
  font-size: 12px;
  display: none;
}

.center {
  text-align: center;
}

.qr {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}

/* PRINT MODE */
@media print {
  body * {
    visibility: hidden;
  }
  #receipt, #receipt * {
    visibility: visible;
  }
  #receipt {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🎮 CHIP PURCHASE</h2>

  <div class="packages">
    <div class="btn" onclick="selectPackage('1B',60000)">1B<br>Rp60,000</div>
    <div class="btn" onclick="selectPackage('500M',30000)">500M<br>Rp30,000</div>
    <div class="btn" onclick="selectPackage('300M',20000)">300M<br>Rp20,000</div>
    <div class="btn" onclick="selectPackage('200M',15000)">200M<br>Rp15,000</div>
  </div>

  <div class="submit" onclick="generateReceipt()">SUBMIT</div>
  <div class="printBtn" id="printBtn" onclick="printReceipt()">🖨 PRINT</div>

  <div class="receipt" id="receipt"></div>
</div>

<script>
let selectedPackage = "";
let price = 0;

function selectPackage(pkg, prc){
  selectedPackage = pkg;
  price = prc;
  alert("Selected: " + pkg);
}

function generateReceipt(){
  if(!selectedPackage){
    alert("Please select package!");
    return;
  }

  let now = new Date();
  let date = now.toLocaleDateString('en-GB');
  let time = now.toLocaleTimeString();
  let trxID = "HGI" + Date.now();

  let qr1 = "https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=156762595";
  let qr2 = "https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=111989349";

  let receiptHTML = `
  <div class="center">
    <b>HGI ENTERTAINMENT</b><br>
    Medan - Indonesia<br>
    Tel: 088245648129
    <hr>
  </div>

  TRX ID : ${trxID}<br>
  Date   : ${date}<br>
  Time   : ${time}<br>
  Status : SUCCESS<br>
  Cashier: ADMIN<br>
  Payment: CASH<br>

  ------------------------------<br>

  ITEM<br>
  Package : ${selectedPackage}<br>
  Price   : Rp${price.toLocaleString()}<br>

  ------------------------------<br>

  TOTAL   : Rp${price.toLocaleString()}<br>

  ------------------------------<br>

  <div class="center">
    QR BONGKAR<br>
  </div>

  <div class="qr">
    <div class="center">
      <img src="${qr1}"><br>
      156762595
    </div>
    <div class="center">
      <img src="${qr2}"><br>
      111989349
    </div>
  </div>

  <div class="center">
    <br>Terima Kasih 🙏<br>
    ------------------<br>
    <i>Menang Bongkar,<br>Kalah Beli Lagi!</i><br><br>

    *** SIMPAN RESIT INI ***<br>
    Bukti transaksi sah
  </div>
  `;

  document.getElementById("receipt").style.display = "block";
  document.getElementById("receipt").innerHTML = receiptHTML;
  document.getElementById("printBtn").style.display = "block";
}

function printReceipt(){
  window.print();
}
</script>

</body>
</html>
